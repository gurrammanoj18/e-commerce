services:
  postgres:
    image: postgres:16
    container_name: voltmart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voltmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Manimanoj
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
