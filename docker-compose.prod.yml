services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voltmart}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-voltmart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-voltmart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://eldoo.in,https://www.eldoo.in,http://175.101.46.98}
      APP_STORE_FRONTEND_URL: ${APP_STORE_FRONTEND_URL:-http://175.101.46.98}
      APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD}
      APP_SEED_DEMO_CATALOG_ENABLED: ${APP_SEED_DEMO_CATALOG_ENABLED:-false}
      APP_GOOGLE_CLIENT_ID: ${APP_GOOGLE_CLIENT_ID:-}
      APP_GOOGLE_MAPS_API_KEY: ${APP_GOOGLE_MAPS_API_KEY:-}
      APP_SMS_OTP_ENABLED: ${APP_SMS_OTP_ENABLED:-false}
      APP_SMS_OTP_REQUEST_URL: ${APP_SMS_OTP_REQUEST_URL:-}
      APP_SMS_OTP_AUTH_HEADER_NAME: ${APP_SMS_OTP_AUTH_HEADER_NAME:-Authorization}
      APP_SMS_OTP_AUTH_HEADER_VALUE: ${APP_SMS_OTP_AUTH_HEADER_VALUE:-}
      APP_SMS_OTP_SENDER_ID: ${APP_SMS_OTP_SENDER_ID:-}
      APP_SMS_OTP_TEMPLATE_ID: ${APP_SMS_OTP_TEMPLATE_ID:-}
      APP_SMS_OTP_MESSAGE_TEMPLATE: ${APP_SMS_OTP_MESSAGE_TEMPLATE:-Your Eldoo OTP is {otp}. It is valid for {minutes} minutes.}
      APP_SMS_OTP_REQUEST_BODY_TEMPLATE: ${APP_SMS_OTP_REQUEST_BODY_TEMPLATE:-{"mobile":"{phoneNumber}","message":"{message}","senderId":"{senderId}","templateId":"{templateId}"}}
      APP_EMAIL_ENABLED: ${APP_EMAIL_ENABLED:-false}
      APP_EMAIL_PROVIDER: ${APP_EMAIL_PROVIDER:-smtp}
      APP_EMAIL_FROM_ADDRESS: ${APP_EMAIL_FROM_ADDRESS:-}
      APP_EMAIL_FROM_NAME: ${APP_EMAIL_FROM_NAME:-Eldoo}
      APP_EMAIL_API_KEY: ${APP_EMAIL_API_KEY:-}
      APP_EMAIL_API_URL: ${APP_EMAIL_API_URL:-https://api.brevo.com/v3/smtp/email}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:-10000}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:-10000}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:-10000}
      APP_WHATSAPP_ENABLED: ${APP_WHATSAPP_ENABLED:-false}
      APP_WHATSAPP_ACCESS_TOKEN: ${APP_WHATSAPP_ACCESS_TOKEN:-}
      APP_WHATSAPP_API_VERSION: ${APP_WHATSAPP_API_VERSION:-v25.0}
      APP_WHATSAPP_BUSINESS_ACCOUNT_ID: ${APP_WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      APP_WHATSAPP_PHONE_NUMBER_ID: ${APP_WHATSAPP_PHONE_NUMBER_ID:-}
      APP_WHATSAPP_SUPPORT_NUMBER: ${APP_WHATSAPP_SUPPORT_NUMBER:-919398546891}
      APP_WHATSAPP_STATUS_TEMPLATE_NAME: ${APP_WHATSAPP_STATUS_TEMPLATE_NAME:-custom_order_v2}
      APP_WHATSAPP_STATUS_TEMPLATE_LANGUAGE: ${APP_WHATSAPP_STATUS_TEMPLATE_LANGUAGE:-en_IN}
      APP_WHATSAPP_TEMPLATE_IMAGE_URL: ${APP_WHATSAPP_TEMPLATE_IMAGE_URL:-https://eldoo.in/whatsapp-logo.png}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api}
      REACT_APP_GOOGLE_CLIENT_ID: ${APP_GOOGLE_CLIENT_ID:-}
      REACT_APP_GOOGLE_MAPS_API_KEY: ${APP_GOOGLE_MAPS_API_KEY:-}
    expose:
      - "80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_CADDY_DOMAIN: ${APP_CADDY_DOMAIN:-eldoo.in}
      APP_CADDY_WWW_DOMAIN: ${APP_CADDY_WWW_DOMAIN:-www.eldoo.in}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
