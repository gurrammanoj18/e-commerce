server {
  listen 80;
  server_name www.eldoo.in;

  return 301 https://eldoo.in$request_uri;
}

server {
  listen 80 default_server;
  server_name eldoo.in voltmart-frontend.onrender.com _;

  root /usr/share/nginx/html;
  index index.html;

  location = /env-config.js {
    try_files $uri =404;
    add_header Cache-Control "no-store";
  }

  location ~* \.(?:js|css|png|jpe?g|gif|webp|avif|svg|ico|json|txt|woff2?)$ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
