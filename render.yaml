services:
  - type: web
    name: voltmart-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_SEED_ADMIN_EMAIL
        sync: false
      - key: APP_SEED_ADMIN_PASSWORD
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://voltmart-frontend.onrender.com
      - key: APP_STORE_FRONTEND_URL
        value: https://voltmart-frontend.onrender.com
      - key: APP_GOOGLE_CLIENT_ID
        sync: false
      - key: APP_EMAIL_ENABLED
        value: "true"
      - key: APP_EMAIL_FROM_ADDRESS
        sync: false
      - key: APP_EMAIL_FROM_NAME
        value: VoltMart
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT
        value: "10000"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT
        value: "10000"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT
        value: "10000"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED
        value: "true"

  - type: web
    name: voltmart-frontend
    env: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://voltmart-backend-xuho.onrender.com/api
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
